version: "3.8"

services:
  online_shop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online_shop
    ports:
      - "5173:5173"
    networks:
      - my-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  my-net:
    driver: bridge
